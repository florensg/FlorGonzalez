name: CD - Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build + Vercel Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Install Cortex memory
        run: pip install cortex-memory

      - name: Restore Cortex Memory Cache
        if: always()
        uses: actions/cache/restore@v4
        with:
          path: .memory/chroma
          key: cortex-memory-${{ github.run_id }}
          restore-keys: |
            cortex-memory-

      - name: Cortex — Record Deploy Context
        run: |
          cortex remember "Push a main — Vercel auto-deploy: ${{ github.event.head_commit.message }}" \
            --type deployment \
            --tag deploy \
            --tag vercel \
            --tag production \
            --commit ${{ github.sha }}

      - name: Save Cortex Memory Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .memory/chroma
          key: cortex-memory-${{ github.run_id }}
